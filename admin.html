
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
.sidebar{width:220px;background:#111827;height:100vh;color:#fff;position:fixed;padding:20px}
.content{margin-left:240px;padding:20px}
.card{background:#fff;padding:20px;border-radius:16px;margin-bottom:20px}
ul{list-style:none;padding:0}
li{padding:10px 0}
@media(max-width:768px){
.sidebar{position:relative;width:auto;height:auto}
.content{margin-left:0}
}
</style>
</head>
<body>
<div class="sidebar">
<h2>SMMZone</h2>
<ul>
<li>Dashboard</li>
<li>Categories</li>
<li>Services</li>
<li>Orders</li>
<li>Payments</li>
<li>Settings</li>
</ul>
</div>

<div class="content">
<div class="card">
<h3>Total Orders</h3>
<p>1,250</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>৳125,000</p>
</div>

<div class="card">
<h3>Services</h3>
<p>Facebook Followers, SMS OTP, YouTube Views</p>
</div>
</div>
</body>
</html>
